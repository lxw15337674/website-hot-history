name: Hot Crawl Hourly

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hot-crawl-hourly
  cancel-in-progress: false

jobs:
  crawl-hourly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
      XHS_HEADERS_JSON: ${{ secrets.XHS_HEADERS_JSON }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Crawl hourly hot data
        run: pnpm crawl:hourly --no-retry
